<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인 - 꼬리살랑</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 360px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 22px;
        }
        .login-box p {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2c3e50;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-login:hover { background: #34495e; }
        .error-msg {
            background: #fdecea;
            color: #e74c3c;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🐾 꼬리살랑</h2>
    <p>관리자 페이지</p>

    <!-- 로그인 실패 시 오류 메시지 -->
    <div class="error-msg" th:if="${param.error}">
        이메일 또는 비밀번호가 일치하지 않습니다.
    </div>

    <form action="/admin/login" method="post">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="username" placeholder="관리자 이메일" required />
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호" required />
        </div>
        <button type="submit" class="btn-login">로그인</button>
    </form>
</div>
</body>
</html>
